atomic:
  OpenApi.speech_transcribe_audio:
    title: 录音转写
    comment: 支持文件形式提交录音并导出转写结果文档
    icon: general-text-recognition
    helpManual: ''
    inputList:
    - key: input_type
      title: 输入方式
      tip: 选择待转写的音频输入形式，默认文件形式
    - key: src_file
      title: 文件路径
      tip: 支持 mp3/wav/pcm/mp4/m4a/aac/opus/flac/ogg/amr/speex/lyb/ac3/ape/m4r/acc/wma，单文件≤500MB、时长≤5小时
    - key: audio_url
      title: URL外链
      tip: 单个 URL 长度≤512 字符，含特殊字符需自动 UrlEncode；对应 api 参数 audioUrl
    - key: role_type
      title: 角色分离
      tip: 是否开启角色分离，对应 api 参数 roleType
    - key: role_num
      title: 说话人数
      tip: 取值 0-10，默认 0 进行盲分；请输入0-10间整数
    - key: language
      title: 语种
      tip: 输入讯飞支持的语种代码
    - key: is_save
      title: 输出文档
      tip: 默认勾选，保存为 txt 文档，仅展示转写结果文本内容
    - key: dst_file
      title: 文档输出路径
      tip: 输入为空时提示“文档输出路径是必填的”
    - key: dst_file_name
      title: 文档输出文件名
      tip: 默认命名为 audio_transcription
    outputList:
    - key: text
      title: 转写文本
      tip: 输出转写后的文本
    - key: result
      title: 转写结果对象
      tip: 输出完整转写结果对象
    - key: saved_file
      title: 保存文件路径
      tip: 输出保存后的文件路径
  OpenApi.speech_tts_long_text:
    title: 长文本语音合成
    comment: 支持文件或文本输入的长文本语音合成，并生成音频文件
    icon: general-text-recognition
    helpManual: ''
    inputList:
    - key: input_type
      title: 输入方式
      tip: 选择待语音合成的内容输入形式，默认文本形式
    - key: src_file
      title: 文件路径
      tip: 支持 .txt/.md/.json/.xml，文件≤350KB；解析后文本≤100000字符、大小0-1M
    - key: text
      title: 文本内容
      tip: 最大输入 100000 字符，文本大小 0-1M；超出提示“文本内容超出最大限制100000字符”
    - key: voice
      title: 发音人
      tip: 选定后支持试听；套餐内默认赠送 3 个发音人
    - key: speed
      title: 语速
      tip: 0-100，默认 50；请输入0-100间整数
    - key: volume
      title: 音量
      tip: 0-100，默认 50；请输入0-100间整数
    - key: pitch
      title: 语调
      tip: 0-100，默认 50；请输入0-100间整数
    - key: dst_file
      title: 音频文件输出路径
      tip: 点击“...”唤起保存文件窗口；输入为空时提示“文档输出路径是必填的”
    - key: dst_file_name
      title: 文件名
      tip: 保存窗口内必填，未输入时提示“请输入文件名”
    - key: audio_format
      title: 保存类型
      tip: 可选 pcm/mp3/speex 8K/speex 16K/opus 8K/opus 16K，默认 mp3
    outputList:
    - key: audio_file
      title: 文件路径
      tip: 输出生成的音频文件路径
    - key: result
      title: 合成结果对象
      tip: 输出完整合成结果对象
  OpenApi.speech_tts_ultra_human_realtime:
    title: 超拟人实时语音播报
    comment: 支持文件或文本输入的超拟人语音播报
    icon: general-text-recognition
    helpManual: ''
    inputList:
    - key: input_type
      title: 输入方式
      tip: 选择待语音合成的内容输入形式，默认文本形式
    - key: src_file
      title: 文件路径
      tip: 支持 .txt/.md/.json，文件≤64KB；解析后总字节数不超过 64K
    - key: text
      title: 文本内容
      tip: 最大输入文本字节大小限制 64K，超出提示“文本内容超出最大限制64K”
    - key: voice
      title: 发音人
      tip: 选定后支持试听；套餐内赠送 5 个默认 + 3 个自定义发音人
    - key: speed
      title: 语速
      tip: 0-100，默认 50；请输入0-100间整数
    - key: volume
      title: 音量
      tip: 0-100，默认 50；请输入0-100间整数
    - key: pitch
      title: 语调
      tip: 0-100，默认 50；请输入0-100间整数
    outputList:
    - key: audio_base64
      title: 音频数据
      tip: 输出可用于实时播放的音频 base64 数据
    - key: result
      title: 合成结果对象
      tip: 输出完整合成结果对象
  OpenApi.speech_tts_ultra_human:
    title: 超拟人语音文件生成
    comment: 支持文件或文本输入的超拟人语音合成，并生成音频文件
    icon: general-text-recognition
    helpManual: ''
    inputList:
    - key: input_type
      title: 输入方式
      tip: 选择待语言合成的内容输入形式，默认文本形式
    - key: src_file
      title: 文件路径
      tip: 支持 .txt/.md/.json，文件≤64KB；解析后总字节数不超过 64K
    - key: text
      title: 文本内容
      tip: 最大输入文本字节大小限制 64K，超出提示“文本内容超出最大限制64K”
    - key: voice
      title: 发音人
      tip: 选定后支持试听；套餐内赠送 5 个默认 + 3 个自定义发音人
    - key: speed
      title: 语速
      tip: 0-100，默认 50；请输入0-100间整数
    - key: volume
      title: 音量
      tip: 0-100，默认 50；请输入0-100间整数
    - key: pitch
      title: 语调
      tip: 0-100，默认 50；请输入0-100间整数
    - key: dst_file
      title: 音频文件输出路径
      tip: 点击“...”唤起保存文件窗口；输入为空时提示“文档输出路径是必填的”
    - key: dst_file_name
      title: 文件名
      tip: 保存窗口内必填，未输入时提示“请输入文件名”
    - key: audio_format
      title: 保存类型
      tip: 可选 pcm/mp3/opus 8K/opus 16K/opus 24K/speex 8K/speex 16K，默认 mp3
    outputList:
    - key: audio_file
      title: 文件路径
      tip: 输出生成的音频文件路径
    - key: result
      title: 合成结果对象
      tip: 输出完整合成结果对象
  OpenApi.nlp_text_correction:
    title: 文本纠错
    comment: 识别中文文本中的错别字、语法错误等，并输出纠错详情
    icon: general-text-recognition
    helpManual: ''
    inputList:
    - key: input_type
      title: 输入方式
      tip: 选择待纠错内容的输入形式，默认文本形式
    - key: is_multi
      title: 批量处理
      tip: 选择“否”处理单个文件，选择“是”按文件夹内文本逐个处理
    - key: src_file
      title: 文件路径
      tip: 支持 .txt/.md/.json/.xml 文本文件，文件大小不超过 7 KB
    - key: src_dir
      title: 文件路径
      tip: 选择存放文本文件的文件夹，按文件逐个执行纠错
    - key: text
      title: 文本内容
      tip: 仅支持文本输入，最大输入 2000 字符，超出时提示“文本内容超出最大限制2000字符”
    - key: error_dst_file
      title: 错误详情文档输出路径
      tip: 默认导出 Excel 文档，仅展示存在错误的纠错明细
    - key: error_dst_file_name
      title: 错误详情文档输出文件名
      tip: 默认命名为 text_correction
    - key: export_corrected_doc
      title: 输出纠错后完整文档
      tip: 根据纠错建议输出纠错后的完整文本，并导出为 txt 文档
    - key: corrected_dst_file
      title: 纠错后完整文档输出路径
      tip: 输出纠错后完整 txt 文档的保存目录
    - key: corrected_dst_file_name
      title: 纠错后完整文档输出文件名
      tip: 默认命名为 text_correction_corrected
    outputList:
    - key: data
      title: 纠错结果对象
      tip: 输出文本纠错结果，便于在后续步骤中继续使用
    - key: error_detail_file
      title: 错误详情文档
      tip: 默认输出错误详情 Excel 文档；当无错误时不生成文件
    - key: corrected_file
      title: 纠错后完整文档
      tip: 输出纠错后的完整 txt 文档路径
  OpenApi.nlp_text_moderation:
    title: 文本合规
    comment: 检测文本中的色情、暴力、涉政、广告等敏感风险内容
    icon: general-text-recognition
    helpManual: ''
    inputList:
    - key: input_type
      title: 输入方式
      tip: 选择待审核的内容输入形式，默认文本形式
    - key: is_multi
      title: 批量处理
      tip: 选择“否”处理单个文件，选择“是”则按文件夹内文本逐个处理
    - key: content
      title: 文本内容
      tip: 仅支持文本输入，最大输入 5000 字符，超出时提示“文本内容超出最大限制5000字符”
    - key: src_file
      title: 文件路径
      tip: 支持 .txt/.md/.json/.xml 文本文件，文件大小不超过 17 KB，解析后文本最大 5000 字符
    - key: src_dir
      title: 文件路径
      tip: 选择存放文本文件的文件夹，按文件逐个执行文本合规审核
    - key: categories
      title: 风险类型
      tip: 勾选指定需检测的敏感风险分类，默认全选
    - key: is_save
      title: 输出文档
      tip: 默认导出审核结果 Excel 文档，仅在审核不合规时生成
    - key: dst_file
      title: 文档输出路径
      tip: 仅勾选“输出文档”时展示；输入为空时提示“文档输出路径是必填的”
    - key: dst_file_name
      title: 文档输出文件名
      tip: 仅勾选“输出文档”时展示，默认命名为 text_moderation
    outputList:
    - key: data
      title: 审核结果对象
      tip: 输出文本审核结果对象，便于在后续步骤中继续使用
    - key: saved_file
      title: 审核结果文档
      tip: 输出审核结果 Excel 文档路径；审核通过时不生成文件
  OpenApi.nlp_translate:
    title: 机器翻译
    comment: 将文本翻译为目标语种，支持中英日韩法等17种语言互译
    icon: general-text-recognition
    helpManual: ''
    inputList:
    - key: input_type
      title: 输入方式
      tip: 选择待翻译文本的输入形式，默认文本形式
    - key: is_multi
      title: 批量处理
      tip: 批量处理选择“否”则每次单个处理一份图片文件，选择“是”则默认按文件夹类文件顺序依次进行处理
    - key: text
      title: 文本内容
      tip: 仅支持文本输入，最大输入字符数限制5000字符，base64编码后大小不得超过 20000 bytes，超出时提示“文本内容超出最大限制5000字符”
    - key: src_file
      title: 文件路径
      tip: 支持 .txt/.md/.json/.xml 文本文件，单个文件解析为文本后长度不得超过5000字符，base64编码后大小不得超过 20000 bytes
    - key: src_dir
      title: 文件路径
      tip: 选择存放文本文件的文件夹，按文件夹类文件顺序依次进行处理
    - key: from_lang
      title: 源语种
      tip: 默认 auto 自动识别；目前自动识别语种（auto）的效果，对长文本及非同语系的文本较为理想，对短文本及同语系的效果还在逐步优化中，请根据您的实际需求场景使用。
    - key: to_lang
      title: 目标语种
      tip: 需与源语种不同，若选择相同则提示“二者不可一致，请重新选择”
    - key: is_save
      title: 输出文档
      tip: 默认保存为 txt 文件，仅展示译文，不支持修改格式
    - key: dst_file
      title: 文档输出路径
      tip: 仅勾选“输出文档”时展示；输入为空时提示“文档输出路径是必填的”
    - key: dst_file_name
      title: 文档输出文件名
      tip: 仅勾选“输出文档”时展示，默认命名为 text_translation
    outputList:
    - key: data
      title: 翻译结果对象
      tip: 输出翻译结果对象，便于在后续步骤中继续使用
    - key: saved_file
      title: 翻译结果文档
      tip: 输出仅包含译文的 txt 文档路径
  OpenApi.ocr_pdf:
    title: PDF文档识别
    comment: 支持文件或 URL 方式提交 PDF，并配置导出格式与页面范围
    icon: general-text-recognition
    helpManual: ''
    inputList:
    - key: input_type
      title: 输入方式
      tip: 选择文件形式或 URL 外链
    - key: is_multi
      title: 批量处理
      tip: 选择“否”处理单个 PDF，选择“是”按文件夹内 PDF 逐个处理
    - key: src_file
      title: 文件（夹）路径
      tip: 请选择单个 PDF 文件
    - key: src_dir
      title: 文件（夹）路径
      tip: 请选择存放 PDF 的文件夹
    - key: pdf_url
      title: URL外链
      tip: 请输入公网可访问的 PDF 链接
    - key: page_mode
      title: 指定页面转换
      tip: 全部页面或自定义页码
    - key: page_ranges
      title: 自定义页码
      tip: 支持单页、多页、连续页，示例 3,5,6-8,10
    - key: export_format
      title: 导出格式
      tip: 指定 PDF 导出格式
    - key: dst_file
      title: 文件输出路径
      tip: 导出结果保存目录
    - key: dst_file_name
      title: 文件输出文件名
      tip: 默认导出文件名为 pdf_ocr
    outputList:
    - key: task_no
      title: 任务编号
      tip: 输出异步任务编号
    - key: status
      title: 任务状态
      tip: 输出任务处理状态
    - key: page_count
      title: 页数
      tip: 输出 PDF 页数
    - key: result_url
      title: 结果链接
      tip: 输出识别结果下载链接
  OpenApi.ocr_business_card:
