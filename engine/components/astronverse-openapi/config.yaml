      title: 票据类型
      tip: 选择要识别的票据类型
    - key: is_multi
      title: 批量处理
      tip: 选择“否”处理单张，选择“是”按文件夹批量处理
    - key: src_file
      title: 图像文件
      tip: 选择单张票据图片文件
    - key: src_dir
      title: 图像文件夹
      tip: 选择存放票据图片的文件夹
